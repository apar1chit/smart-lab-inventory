{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="page-title mb-0">Add New Chemical</h2>
            <a href="{{ url_for('chemicals') }}" class="btn btn-outline-secondary">Back to List</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form action="{{ url_for('add_chemical') }}" method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Chemical Name <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" list="chemicalNamesList" autocomplete="off" required>
                            <datalist id="chemicalNamesList">
                                {% for c_name in existing_chemicals %}
                                <option value="{{ c_name }}">
                                {% endfor %}
                            </datalist>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Chemical Formula <span class="text-danger">*</span></label>
                            <input type="text" name="formula" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-medium">CAS Number</label>
                            <input type="text" name="cas_number" class="form-control" placeholder="e.g. 7732-18-5">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Hazard Category</label>
                            <select name="hazard_category" class="form-select">
                                <option value="">None / Not Specified</option>
                                <option value="Flammable">Flammable</option>
                                <option value="Corrosive">Corrosive</option>
                                <option value="Toxic">Toxic</option>
                                <option value="Oxidizer">Oxidizer</option>
                                <option value="Irritant">Irritant</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Inventory Category <span class="text-danger">*</span></label>
                            <select name="category" class="form-select" required>
                                <option value="Chemicals">Chemicals (General)</option>
                                <option value="Reagents">Reagents</option>
                                <option value="Indicators">Indicators</option>
                                <option value="Miscellaneous">Miscellaneous</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Expiry Date</label>
                            <input type="date" name="expiry_date" class="form-control">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Quantity <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" min="0" name="quantity" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Unit <span class="text-danger">*</span></label>
                            <select name="unit" class="form-select" required>
                                <option value="mL">mL (Milliliters)</option>
                                <option value="g">g (Grams)</option>
                                <option value="mg">mg (Milligrams)</option>
                                <option value="kg">kg (Kilograms)</option>
                                <option value="L">L (Liters)</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-medium">Storage Location <span class="text-danger">*</span></label>
                        <input type="text" name="location" class="form-control" placeholder="e.g. Shelf A2, Flammables Cabinet" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary py-2">Save Chemical</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Edit Glassware: {{ item.name }}</h5>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('edit_glassware', id=item.id) }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" class="form-control" value="{{ item.name }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Quantity</label>
                            <input type="number" name="quantity" class="form-control" value="{{ item.quantity }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Condition</label>
                            <select name="condition" class="form-select">
                                <option value="Good" {% if item.condition == 'Good' %}selected{% endif %}>Good</option>
                                <option value="Damaged" {% if item.condition == 'Damaged' %}selected{% endif %}>Damaged</option>
                                <option value="Lost" {% if item.condition == 'Lost' %}selected{% endif %}>Lost</option>
                            </select>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <a href="{{ url_for('glassware_detail', id=item.id) }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Edit Chemical: {{ chemical.name }}</h5>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('edit_chemical', id=chemical.id) }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" class="form-control" value="{{ chemical.name }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Formula</label>
                            <input type="text" name="formula" class="form-control" value="{{ chemical.formula }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" name="location" class="form-control" value="{{ chemical.location }}" required>
                        </div>
                        <div class="mb-3">
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Unit of Measurement</label>
                            <select name="unit" class="form-select" required>
                                <option value="g" {% if chemical.unit == 'g' %}selected{% endif %}>g (Grams)</option>
                                <option value="mg" {% if chemical.unit == 'mg' %}selected{% endif %}>mg (Milligrams)</option>
                                <option value="kg" {% if chemical.unit == 'kg' %}selected{% endif %}>kg (Kilograms)</option>
                                <option value="mL" {% if chemical.unit == 'mL' %}selected{% endif %}>mL (Milliliters)</option>
                                <option value="L" {% if chemical.unit == 'L' %}selected{% endif %}>L (Liters)</option>
                            </select>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <a href="{{ url_for('chemical_detail', id=chemical.id) }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Edit Chemical: {{ chemical.name }}</h5>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('edit_chemical', id=chemical.id) }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" class="form-control" value="{{ chemical.name }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Formula</label>
                            <input type="text" name="formula" class="form-control" value="{{ chemical.formula }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" name="location" class="form-control" value="{{ chemical.location }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select name="category" class="form-select">
                                <option value="Chemicals" {% if chemical.category == 'Chemicals' %}selected{% endif %}>Chemicals</option>
                                <option value="Reagents" {% if chemical.category == 'Reagents' %}selected{% endif %}>Reagents</option>
                                <option value="Indicators" {% if chemical.category == 'Indicators' %}selected{% endif %}>Indicators</option>
                                <option value="Miscellaneous" {% if chemical.category == 'Miscellaneous' %}selected{% endif %}>Miscellaneous</option>
                            </select>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <a href="{{ url_for('chemical_detail', id=chemical.id) }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

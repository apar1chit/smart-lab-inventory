name: Build Android APK (Live Connection)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK from PWA
        run: |
          # Create a dummy keystore for the build
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=SmartLab, OU=Lab, O=SmartLab, L=City, S=State, C=US"
          
          bubblewrap init --manifest="https://smart-lab-inventory-bt4n.onrender.com/static/manifest.json" \
          --directory="./twa-project" \
          --metaData='{
            "appName":"Smart Lab Inventory",
            "shortName":"SmartLab",
            "host":"smart-lab-inventory-bt4n.onrender.com",
            "startUrl":"/",
            "iconUrl":"https://smart-lab-inventory-bt4n.onrender.com/static/icons/icon-512x512.png",
            "maskableIconUrl":"https://smart-lab-inventory-bt4n.onrender.com/static/icons/icon-512x512.png",
            "themeColor":"#6366f1",
            "backgroundColor":"#ffffff",
            "navigationColor":"#ffffff",
            "display":"standalone",
            "orientation":"any",
            "statusBarStyle":"default",
            "splashScreenFadeOutDuration":300,
            "shortcuts":[],
            "webmanifest":"/static/manifest.json"
          }'
          
          # Configure bubblewrap to use the generated keystore
          echo '{"jdkPath":"/usr/lib/jvm/java-11-openjdk-amd64","androidSdkPath":"/usr/local/lib/android/sdk"}' > ~/.bubblewrap/config.json
          
          cd twa-project
          bubblewrap build --signingKeyPath="../android.keystore" --signingKeyAlias="android" --signingKeyPassword="password" --signingStorePassword="password" --no-prompt

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: SmartLab-Inventory-APK
          path: twa-project/*.apk
